name: Feature Request
description: Suggest an idea for Formacraft
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you want solved and how Formacraft could address it.

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What limitation or pain point does this address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - AI / prompts
        - Skeleton / generators
        - Components / sockets
        - Tools / UI
        - Memory / editing
        - Python backend
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
