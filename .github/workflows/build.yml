name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: python backend smoke
        run: |
          pip install -r python_backend/requirements.lock
          python python_backend/tools/spec_contract_smoke.py
      - name: eval quality gate
        working-directory: python_backend
        run: python -m eval.ci_gate
      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/
