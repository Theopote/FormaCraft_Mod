plugins {
	id 'fabric-loom' version "${loom_version}"
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	// Add repositories to retrieve artifacts from in here.
	// You should only use this when depending on other mods because
	// Loom adds the essential maven repositories to download Minecraft and libraries from automatically.
	// See https://docs.gradle.org/current/userguide/declaring_repositories.html
	// for more information about repositories.
}

loom {
	mods {
		"formacraft" {
			sourceSet sourceSets.main
		}
	}
}

fabricApi {
	configureDataGeneration()
}

dependencies {
	// To change the versions see the gradle.properties file
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

	// Fabric API. This is technically optional, but you probably want it anyway.
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
	
	// JSON parsing for AI HTTP responses
	implementation "com.google.code.gson:gson:2.10.1"
	
	// Jackson for LLM JSON parsing (K3.1)
	implementation "com.fasterxml.jackson.core:jackson-databind:2.17.1"
	implementation "com.fasterxml.jackson.core:jackson-annotations:2.17.1"

	testImplementation "org.junit.jupiter:junit-jupiter:5.11.4"
	testRuntimeOnly "org.junit.platform:junit-platform-launcher:1.11.4"

	// Generate mixin refmap for production runtime
	annotationProcessor "net.fabricmc:sponge-mixin:0.16.3+mixin.0.8.7"
}

processResources {
	inputs.property "version", project.version

	filesMatching("fabric.mod.json") {
		expand "version": inputs.properties.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 21
}

tasks.register('validateAssemblyExamples', JavaExec) {
	group = 'verification'
	description = 'Validate assets/formacraft/assembly_examples/*.json against AssemblySpecValidator.'
	dependsOn tasks.named('classes')
	classpath = sourceSets.main.runtimeClasspath
	mainClass = 'com.formacraft.tools.ValidateAssemblyExamplesMain'
	args 'src/main/resources/assets/formacraft/assembly_examples'
}

tasks.register('validateCultureCards', JavaExec) {
	group = 'verification'
	description = 'Validate assets/formacraft/culture_cards/*.json (shape + example refs).'
	dependsOn tasks.named('classes')
	classpath = sourceSets.main.runtimeClasspath
	mainClass = 'com.formacraft.tools.ValidateCultureCardsMain'
	args 'src/main/resources/assets/formacraft/culture_cards', 'src/main/resources/assets/formacraft/assembly_examples'
}

tasks.register('evalAssemblyCases', JavaExec) {
	group = 'verification'
	description = 'Run P0 eval cases under assets/formacraft/eval_cases (normalize->macro->validate->compile).'
	dependsOn tasks.named('classes')
	classpath = sourceSets.main.runtimeClasspath
	mainClass = 'com.formacraft.tools.EvalAssemblyCasesMain'
	args 'src/main/resources/assets/formacraft/eval_cases'
}

tasks.register('exportAssemblySchema', JavaExec) {
	group = 'application'
	description = 'Regenerate assets/formacraft/ai-assembly-schema.json from MetaAssembly runtime metadata.'
	dependsOn tasks.named('classes')
	classpath = sourceSets.main.runtimeClasspath
	mainClass = 'com.formacraft.tools.ExportAssemblySchemaMain'
}

tasks.register('demoCultureRetrieve', JavaExec) {
	group = 'application'
	description = 'Demo: keyword retrieval over culture_cards, prints retrieval + draft + few-shots.'
	dependsOn tasks.named('classes')
	classpath = sourceSets.main.runtimeClasspath
	mainClass = 'com.formacraft.tools.DemoCultureRetrieveMain'
}

tasks.named('check') {
	dependsOn tasks.named('validateAssemblyExamples')
	dependsOn tasks.named('validateCultureCards')
	dependsOn tasks.named('evalAssemblyCases')
	dependsOn tasks.named('test')
}

tasks.named('test') {
	useJUnitPlatform()
}

java {
	// Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
	// if it is present.
	// If you remove this line, sources will not be generated.
	withSourcesJar()

	sourceCompatibility = JavaVersion.VERSION_21
	targetCompatibility = JavaVersion.VERSION_21
}

jar {
	inputs.property "archivesName", project.base.archivesName

	from("LICENSE") {
		rename { "${it}_${inputs.properties.archivesName}"}
	}
}

// configure the maven publication
publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = project.archives_base_name
			from components.java
		}
	}

	// See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
	repositories {
		// Add repositories to publish to here.
		// Notice: This block does NOT have the same function as the block in the top level.
		// The repositories here will be used for publishing your artifact, not for
		// retrieving dependencies.
	}
}